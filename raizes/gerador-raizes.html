<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo de Raízes - Gerador</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 30px 15px;
        }

        /* Fundo matemático sutil */
        .math-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            user-select: none;
            opacity: 0.02;
            color: var(--text-main);
            font-weight: 600;
        }
        .formula { position: absolute; white-space: nowrap; }

        /* Painel de Controle Superior */
        .no-print-area {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
        }

        .no-print-area h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .no-print-area p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        .config-row { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            align-items: center; 
        }
        
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            padding: 10px 12px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border); 
            border-radius: 8px; 
            text-align: center; 
            font-size: 14px; 
            color: white;
            font-weight: 600;
        }
        .num-input { width: 90px; }

        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--accent); cursor: pointer; user-select: none; }
        .checkbox-group input { cursor: pointer; width: 16px; height: 16px; }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #0f172a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            gap: 6px;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-blue { background-color: var(--accent); color: #0f172a; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }
        .btn-green { background-color: var(--success); color: #0f172a; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
        .btn-home { background-color: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--card-border); }

        /* Estilização das Páginas A4 (Visual Web) */
        .page { 
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 210mm; 
            height: 297mm; 
            padding: 12mm 15mm; 
            margin: 0 auto 30px auto; 
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr); /* 3 Linhas estáveis para fixar 6 cartelas */
            gap: 10mm;
            box-sizing: border-box;
        }

        .cartela {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .cartela-header {
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px dashed var(--card-border);
            padding-bottom: 6px;
            letter-spacing: 0.5px;
            color: var(--accent);
        }

        .grid-bingo {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            flex-grow: 1;
        }

        .cell {
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            background: rgba(0,0,0,0.2);
            color: white;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }

        /* CONFIGURAÇÕES DE IMPRESSÃO - 6 CARTELAS PERFEITAS POR PÁGINA */
        @media print {
            html, body {
                background: white !important;
                color: black !important;
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            
            .no-print-area, .math-bg, h1 { display: none !important; }
            
            .page {
                background: white !important;
                color: black !important;
                border: none !important;
                box-shadow: none !important;
                padding: 10mm 12mm 8mm 12mm !important;
                margin: 0 !important;
                width: 210mm !important;
                height: 297mm !important;
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                grid-template-rows: repeat(3, 1fr) !important;
                gap: 8mm 10mm !important; /* Espaçamento cirúrgico para evitar estouro */
                page-break-after: always !important;
                break-after: page !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            .cartela {
                background: white !important;
                border: 2px solid #000 !important;
                border-radius: 8px !important;
                padding: 10px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .cartela-header {
                color: black !important;
                border-bottom: 2px dashed #000 !important;
                font-size: 13px !important;
                margin-bottom: 6px !important;
                padding-bottom: 4px !important;
            }

            .grid-bingo { gap: 5px !important; }

            .cell {
                background: white !important;
                border: 1px solid #000 !important;
                color: black !important;
                border-radius: 4px !important;
                font-size: 22px !important;
            }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="math-bg">
        <div class="formula" style="top: 5%; left: 5%; font-size: 2rem;">√x = y ⇔ y² = x</div>
        <div class="formula" style="top: 15%; right: 10%; font-size: 1.5rem;">³√27 = 3</div>
        <div class="formula" style="bottom: 20%; left: 8%; font-size: 1.8rem;">√144 = 12</div>
    </div>

    <h1 style="text-align: center; color: var(--accent); margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px; z-index: 10;">🎲 Bingo de Raízes</h1>

    <div class="no-print-area">
        <h2>✍️ Gerador de Cartelas de Bingo</h2>
        <p>Gere lotes de cartelas sob medida. O sistema agrupa perfeitamente 6 cartelas por folha A4.</p>
        
        <div class="config-row">
            <div class="input-group">
                <label>Qtd. de Cartelas</label>
                <input type="number" id="qtdCartelas" value="6" min="1" class="num-input">
            </div>
            
            <div class="input-group">
                <label>Radicando Mínimo</label>
                <input type="number" id="minVal" value="1" class="num-input">
            </div>

            <div class="input-group">
                <label>Radicando Máximo</label>
                <input type="number" id="maxVal" value="100" class="num-input">
            </div>

            <div class="input-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="apenasExatas" checked>
                    Apenas Raízes Exatas
                </label>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://profpablosanches.github.io/bingo/index.html" class="btn btn-home">🏠 Pagina Inicial</a>
            <button class="btn btn-blue" onclick="gerarCartelas()">🎲 Gerar Cartelas</button>
            <button class="btn btn-green" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        function gerarCartelas() {
            const qtd = parseInt(document.getElementById('qtdCartelas').value);
            const min = parseInt(document.getElementById('minVal').value);
            const max = parseInt(document.getElementById('maxVal').value);
            const apenasExatas = document.getElementById('apenasExatas').checked;
            const container = document.getElementById('print-area');
            
            container.innerHTML = '';

            let pool = [];
            for (let i = min; i <= max; i++) {
                if (apenasExatas) {
                    if (Math.sqrt(i) % 1 === 0) pool.push(i);
                } else {
                    pool.push(i);
                }
            }

            if (pool.length < 9) {
                alert(`Erro: O intervalo possui apenas ${pool.length} opções, mas são necessários no mínimo 9 para compor a cartela.`);
                return;
            }

            let currentPage;
            for (let c = 0; c < qtd; c++) {
                // ATUALIZADO: Agora cria uma nova página A4 a cada 6 cartelas criadas
                if (c % 6 === 0) {
                    currentPage = document.createElement('div');
                    currentPage.className = 'page';
                    container.appendChild(currentPage);
                }

                const cartela = document.createElement('div');
                cartela.className = 'cartela';
                
                const header = document.createElement('div');
                header.className = 'cartela-header';
                header.innerText = `BINGO DE RAÍZES #${c + 1}`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-bingo';

                let sorteadosCartela = [...pool].sort(() => 0.5 - Math.random()).slice(0, 9);
                sorteadosCartela.sort((a, b) => a - b);

                sorteadosCartela.forEach(num => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const valorRaiz = Math.sqrt(num);
                    cell.innerText = (valorRaiz % 1 === 0) ? valorRaiz : valorRaiz.toFixed(2);
                    
                    grid.appendChild(cell);
                });

                cartela.appendChild(header);
                cartela.appendChild(grid);
                currentPage.appendChild(cartela);
            }
        }
        
        window.onload = gerarCartelas;
    </script>
</body>
</html>
