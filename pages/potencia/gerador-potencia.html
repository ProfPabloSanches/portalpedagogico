<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo de Potenciação</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 30px 15px;
        }

        /* Fundo matemático sutil */
        .math-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            user-select: none;
            opacity: 0.02;
            color: var(--text-main);
            font-weight: 600;
        }
        .formula { position: absolute; white-space: nowrap; }

        /* Painel de Controle Superior */
        .setup-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
        }

        .setup-container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .setup-container p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .config-row { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 20px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }
        
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            padding: 10px 12px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border); 
            border-radius: 8px; 
            text-align: center; 
            font-size: 14px; 
            color: white;
            font-weight: 600;
            outline: none;
        }
        
        .highlight input { border: 1px solid var(--accent); color: var(--accent); width: 90px; background: rgba(56, 189, 248, 0.05); }
        .grid-select { border: 1px solid #e67e22; color: #e67e22; font-weight: bold; cursor: pointer; height: 41px; background: rgba(230, 126, 34, 0.05); }
        .layout-select { border: 1px solid var(--success); color: var(--success); font-weight: bold; cursor: pointer; height: 41px; background: rgba(46, 204, 113, 0.05); }
        .math-input { width: 75px; }

        .free-option { 
            display: flex; align-items: center; gap: 8px; padding: 10px 16px; 
            background: rgba(239, 68, 68, 0.05); border-radius: 8px; border: 1px dashed var(--danger); 
            cursor: pointer; height: 41px; box-sizing: border-box; user-select: none;
        }
        .free-option input { cursor: pointer; width: 16px; height: 16px; }
        .free-option span { font-size: 11px; font-weight: bold; color: var(--danger); letter-spacing: 0.5px; }

        .button-row { display: flex; justify-content: center; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        .btn { 
            padding: 12px 24px; color: #0f172a; border: none; border-radius: 10px; 
            font-size: 14px; cursor: pointer; font-weight: 700; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; 
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        
        .shuffle-btn { background: var(--accent); color: #0f172a; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }
        .print-btn { background: var(--success); color: #0f172a; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
        .sorteador-btn { background: transparent; color: var(--accent); border: 1px solid var(--card-border); }
        .sorteador-btn:hover { background: rgba(255,255,255,0.02); border-color: var(--accent); }
        .home-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--card-border); }

        /* Estilos Globais de Renderização das Páginas (Visualização Web) */
        .page { 
            display: grid; 
            margin: 0 auto 40px auto; 
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-sizing: border-box; 
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            page-break-after: always;
            overflow: hidden;
        }

        /* Configurações Dinâmicas de Layout baseadas na escolha do usuário */
        .layout-2 { width: 297mm; height: 210mm; grid-template-columns: 1fr 1fr; padding: 12mm; gap: 12mm; }
        .layout-4 { width: 210mm; height: 297mm; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 12mm; gap: 12mm; }
        .layout-6 { width: 210mm; height: 297mm; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); padding: 10mm 12mm; gap: 8mm 10mm; }

        .card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border); 
            padding: 14px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100%; 
            box-sizing: border-box; 
            border-radius: 12px;
        }

        h4 { margin: 0 0 8px 0; color: var(--accent); font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 1px dashed var(--card-border); padding-bottom: 6px; letter-spacing: 0.5px; }
        
        table { width: 100%; border-collapse: collapse; flex-grow: 1; table-layout: fixed; }
        td { 
            border: 1px solid var(--card-border); 
            font-weight: 800; 
            color: white; 
            padding: 4px; 
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }
        
        /* Ajuste fino visual por tamanho de grade */
        .grid-3 td { font-size: 2.2rem; }
        .grid-4 td { font-size: 1.6rem; }
        .grid-5 td { font-size: 1.2rem; }

        .free-cell { background-color: rgba(239, 68, 68, 0.15) !important; color: var(--danger) !important; font-size: 0.85em !important; font-family: system-ui, sans-serif !important; }

        .card-footer { 
            margin-top: 10px; 
            padding-top: 6px;
            border-top: 1px dashed var(--card-border);
            font-size: 10px; 
            color: var(--text-muted); 
            display: flex; 
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* AJUSTES E CALIBRAÇÃO DE IMPRESSÃO PROFISSIONAL */
        @media print {
            html, body { background: white !important; color: black !important; display: block !important; padding: 0 !important; margin: 0 !important; }
            .setup-container, .math-bg, h1 { display: none !important; }
            .page { background: white !important; color: black !important; box-shadow: none !important; border: none !important; margin: 0 !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; display: grid !important; page-break-after: always !important; break-after: page !important; }
            
            .layout-2 { width: 297mm !important; height: 210mm !important; padding: 10mm !important; gap: 10mm !important; grid-template-columns: 1fr 1fr !important; }
            .layout-4 { width: 210mm !important; height: 297mm !important; padding: 10mm !important; gap: 10mm !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: 1fr 1fr !important; }
            .layout-6 { width: 210mm !important; height: 297mm !important; padding: 10mm 12mm 8mm 12mm !important; gap: 8mm 10mm !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: repeat(3, 1fr) !important; }

            .card { background: white !important; border: 2px solid #000 !important; border-radius: 8px !important; padding: 10px !important; page-break-inside: avoid !important; break-inside: avoid !important; }
            h4 { color: black !important; border-bottom: 2px dashed #000 !important; font-size: 12px !important; margin-bottom: 6px !important; padding-bottom: 4px !important; }
            td { border: 1px solid #000 !important; color: black !important; background: white !important; }
            .free-cell { background: #f5f5f5 !important; color: #000 !important; font-weight: 900 !important; }
            .card-footer { color: #333 !important; border-top: 1px dashed #000 !important; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="math-bg">
        <div class="formula" style="top: 5%; left: 5%; font-size: 2rem;">aⁿ = a · a · a...</div>
        <div class="formula" style="top: 15%; right: 10%; font-size: 1.5rem;">2³ = 8</div>
        <div class="formula" style="bottom: 20%; left: 8%; font-size: 1.8rem;">10² = 100</div>
    </div>

    <h1 style="text-align: center; color: var(--accent); margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px; z-index: 10;">🎲 Bingo de Potenciação</h1>
    
    <div class="setup-container">
        <h2>✍️ Gerador de Cartelas de Bingo</h2>
        <p>Configure os parâmetros abaixo para gerar cartelas personalizadas prontas para impressão.</p>
        
        <div class="config-row">
            <div class="input-group highlight">
                <label>Qtd. Cartelas</label>
                <input type="number" id="qtdCartelas" value="30">
            </div>
            <div class="input-group">
                <label>Grade</label>
                <select id="gridSize" class="grid-select">
                    <option value="3">3x3</option>
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                </select>
            </div>
            <label class="free-option">
                <input type="checkbox" id="useFree" checked>
                <span>CENTRO LIVRE</span>
            </label>
        </div>

        <div class="config-row">
            <div class="input-group"><label>Base Mín.</label><input type="number" id="baseMin" class="math-input" value="1"></div>
            <div class="input-group"><label>Base Máx.</label><input type="number" id="baseMax" class="math-input" value="6"></div>
            <div class="input-group"><label>Exp. Mín.</label><input type="number" id="expMin" class="math-input" value="1"></div>
            <div class="input-group"><label>Exp. Máx.</label><input type="number" id="expMax" class="math-input" value="6"></div>
        </div>

        <div class="button-row">
            <a href="https://profpablosanches.github.io/portalpedagogico/" class="btn home-btn">🏠 Página Inicial</a>
            <a href="bingo-potencia.html" class="btn sorteador-btn">🎮 Sorteador</a>
            
            <select id="layoutSorteio" class="layout-select">
                <option value="2">2 Cartelas / Pág</option>
                <option value="4">4 Cartelas / Pág</option>
                <option value="6" selected>6 Cartelas / Pág</option>
            </select>
            
            <button class="btn shuffle-btn" onclick="gerarCartelas()">🔄 Gerar Novo Lote</button>
            <button class="btn print-btn" onclick="window.print()">🖨️ Imprimir / PDF</button>
        </div>
    </div>

    <div id="bingo-container"></div>

    <script>
        const container = document.getElementById('bingo-container');

        async function gerarHashGrupo(semente) {
            const encoder = new TextEncoder();
            const data = encoder.encode(semente);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 10).toUpperCase();
        }

        function shuffle(array) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function gerarCartelas() {
            const bMin = document.getElementById('baseMin').value;
            const bMax = document.getElementById('baseMax').value;
            const eMin = document.getElementById('expMin').value;
            const eMax = document.getElementById('expMax').value;
            const totalCartelas = parseInt(document.getElementById('qtdCartelas').value);
            const dimensao = parseInt(document.getElementById('gridSize').value);
            const useFree = document.getElementById('useFree').checked;
            const perPage = parseInt(document.getElementById('layoutSorteio').value);
            
            const sementeGrupo = Date.now() + bMin + bMax + eMin + eMax + totalCartelas;
            const hashUnicoLote = await gerarHashGrupo(sementeGrupo.toString());

            let resultadosSet = new Set();
            for (let b = parseInt(bMin); b <= parseInt(bMax); b++) {
                for (let e = parseInt(eMin); e <= parseInt(eMax); e++) {
                    resultadosSet.add(Math.pow(b, e));
                }
            }
            let listaResultados = Array.from(resultadosSet);
            const totalCasas = dimensao * dimensao;
            const centroIndex = Math.floor(totalCasas / 2);
            const qtdNecessaria = (useFree && dimensao % 2 !== 0) ? totalCasas - 1 : totalCasas;
            
            if (listaResultados.length < qtdNecessaria) {
                alert(`Erro: O intervalo de potências gera apenas ${listaResultados.length} resultados únicos, mas a cartela precisa de ${qtdNecessaria}.`);
                return;
            }

            container.innerHTML = '';
            let currentCard = 1;
            const totalPaginas = Math.ceil(totalCartelas / perPage);

            for (let p = 0; p < totalPaginas; p++) {
                let pageDiv = document.createElement('div');
                pageDiv.className = `page layout-${perPage}`;
                
                for (let c = 0; c < perPage; c++) {
                    if (currentCard > totalCartelas) break;

                    let sorteados = shuffle([...listaResultados]).slice(0, qtdNecessaria);
                    let cardHtml = `<div class="card grid-${dimensao}">
                        <h4>BINGO DE POTÊNCIAS</h4>
                        <table>`;
                    
                    let numIndex = 0;
                    for (let l = 0; l < dimensao; l++) {
                        cardHtml += '<tr>';
                        for (let col = 0; col < dimensao; col++) {
                            let cellIndex = (l * dimensao) + col;
                            if (useFree && dimensao % 2 !== 0 && cellIndex === centroIndex) {
                                cardHtml += `<td class="free-cell">LIVRE</td>`;
                            } else {
                                cardHtml += `<td>${sorteados[numIndex]}</td>`;
                                numIndex++;
                            }
                        }
                        cardHtml += '</tr>';
                    }
                    cardHtml += `</table>
                        <div class="card-footer">
                            <span>ID LOTE: ${hashUnicoLote}</span>
                            <span>CARTELA: #${String(currentCard).padStart(3, '0')}</span>
                        </div>
                    </div>`;
                    pageDiv.innerHTML += cardHtml;
                    currentCard++;
                }
                container.appendChild(pageDiv);
            }
        }

        gerarCartelas();
    </script>
</body>
</html>
