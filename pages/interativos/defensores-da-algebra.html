<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defensores da Álgebra</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        h1 {
            color: #00e676;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
            font-size: 28px;
        }

        .btn-portal {
            padding: 8px 15px;
            background-color: #0f3460;
            color: #00e676;
            text-decoration: none;
            border: 2px solid #00e676;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-portal:hover {
            background-color: #00e676;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        #game-container {
            position: relative;
            background-color: #162447;
            border: 4px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #1f4068, #162447);
        }

        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #00e676;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
        }

        #equation-display {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
        }

        #input-container {
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            text-align: center;
            outline: none;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            background-color: #1a1a2e;
            color: #fff;
            border: 2px solid #0f3460;
            outline: none;
            cursor: pointer;
        }

        button {
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #00e676;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #00b359;
        }

        /* Botões de controle durante a partida */
        .control-buttons {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 5; /* Garante que fique acima do canvas */
        }

        .btn-control {
            padding: 6px 12px;
            font-size: 14px;
            background-color: #0f3460;
            color: #fff;
            border: 1px solid #1f4068;
        }

        .btn-control:hover {
            background-color: #1f4068;
        }

        .btn-danger {
            background-color: #441a1a;
            border-color: #662222;
        }

        .btn-danger:hover {
            background-color: #662222;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score { color: #00e676; }
        .lives { color: #ff5252; }

        /* Telas de Menu e Game Over */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-radius: 4px;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>Defensores da Álgebra</h1>
        <a href="https://profpablosanches.github.io/portalpedagogico/" class="btn-portal">← Voltar ao Portal</a>
    </header>

    <div id="game-container">
        <div id="hud">
            <span class="score">Pontos: <span id="score-val">0</span></span>
            <span class="lives">Vidas: <span id="lives-val">3</span></span>
        </div>

        <div class="control-buttons">
            <button id="in-game-restart-btn" class="btn-control">Resetar Partida</button>
            <button id="in-game-change-diff-btn" class="btn-control btn-danger">Mudar Dificuldade</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <div id="ui-container">
            <div id="equation-display">Aguardando início...</div>
            <div id="input-container">
                <input type="number" id="answer-input" placeholder="X = ?" autocomplete="off" disabled>
                <button id="fire-btn" disabled>ATIRAR</button>
            </div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h2 style="font-size: 32px; color: #00e676;">Escolha a Velocidade do Invasor:</h2>
            <select id="speed-select">
                <option value="0.1">Lento (Ideal para treinar)</option>
                <option value="0.5" selected>Normal (Padrão)</option>
                <option value="1.0">Rápido (Desafio)</option>
                <option value="2.0">Velocidade da Luz! ⚡</option>
            </select>
            <button id="start-btn" style="font-size: 20px; padding: 12px 40px;">INICIAR JOGO</button>
        </div>

        <div id="game-over-screen" class="overlay-screen hidden">
            <h2 style="font-size: 40px; color: #ff5252;">Fim de Jogo!</h2>
            <p style="font-size: 20px;">Você defendeu o reino até onde pôde.</p>
            <p style="font-size: 24px; color: #00e676;">Pontuação Final: <span id="final-score">0</span></p>
            <p style="font-size: 16px; color: #aaa;">Use os botões no topo para reiniciar ou mudar a velocidade.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Elementos da Interface
        const equationDisplay = document.getElementById('equation-display');
        const answerInput = document.getElementById('answer-input');
        const fireBtn = document.getElementById('fire-btn');
        const scoreVal = document.getElementById('score-val');
        const livesVal = document.getElementById('lives-val');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        
        // Novos botões de controle constantes
        const inGameRestartBtn = document.getElementById('in-game-restart-btn');
        const inGameChangeDiffBtn = document.getElementById('in-game-change-diff-btn');
        
        const speedSelect = document.getElementById('speed-select');

        // Estado do Jogo
        let score = 0;
        let lives = 3;
        let currentX = 0;
        let gameActive = false;
        let baseSpeed = 0.8;

        // Entidades do jogo
        const tower = { x: 700, y: 225, radius: 30 };
        let monster = { x: 0, y: 225, speed: 0.8, radius: 20, active: true };
        let projectile = { x: 700, y: 225, targetX: 0, targetY: 225, speed: 15, active: false };

        // --- GERADOR DE EQUAÇÕES PROCEDURAL ---
        function generateEquation() {
            currentX = Math.floor(Math.random() * 10) + 1; 
            const coefficient = Math.floor(Math.random() * 5) + 2; 
            const constant = Math.floor(Math.random() * 10) + 1; 
            const isAddition = Math.random() > 0.5;

            let result;
            let equationText = "";

            if (isAddition) {
                result = (coefficient * currentX) + constant;
                equationText = `${coefficient}x + ${constant} = ${result}`;
            } else {
                result = (coefficient * currentX) - constant;
                equationText = `${coefficient}x - ${constant} = ${result}`;
            }

            equationDisplay.textContent = equationText;
        }

        // --- CONTROLE DE FLUXO ---
        function startGame() {
            baseSpeed = parseFloat(speedSelect.value);
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // Inicializa/Reseta valores da partida
            score = 0;
            lives = 3;
            scoreVal.textContent = score;
            livesVal.textContent = lives;
            projectile.active = false;

            // Habilita os inputs do jogo
            answerInput.disabled = false;
            fireBtn.disabled = false;
            
            gameActive = true;
            resetMonster();
            answerInput.focus();
        }

        function checkAnswer() {
            if (!gameActive || projectile.active) return;

            const playerAnswer = parseInt(answerInput.value);

            if (playerAnswer === currentX) {
                projectile.x = tower.x;
                projectile.y = tower.y;
                projectile.targetX = monster.x;
                projectile.targetY = monster.y;
                projectile.active = true;
                
                score += 10;
                scoreVal.textContent = score;
            } else {
                answerInput.style.border = "2px solid #ff5252";
                setTimeout(() => answerInput.style.border = "none", 500);
            }

            answerInput.value = '';
            answerInput.focus();
        }

        function resetMonster() {
            monster.x = 0;
            monster.speed = baseSpeed + (score * 0.005); 
            generateEquation();
        }

        function gameOver() {
            gameActive = false;
            answerInput.disabled = true;
            fireBtn.disabled = true;
            finalScore.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        function goToMenu() {
            gameActive = false; // Pausa a lógica do jogo
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            equationDisplay.textContent = "Aguardando início...";
            answerInput.disabled = true;
            fireBtn.disabled = true;
        }

        // --- ESCUTADORES DE EVENTOS ---
        startBtn.addEventListener('click', startGame);
        fireBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
        
        // Eventos dos botões constantes
        inGameRestartBtn.addEventListener('click', () => {
            // Se clicar em resetar, reinicia a partida com a dificuldade atual
            startGame();
        });
        
        inGameChangeDiffBtn.addEventListener('click', () => {
            // Se clicar em mudar dificuldade, para o jogo e volta pro menu
            goToMenu();
        });

        // --- LOOP DE RENDERIZAÇÃO E ATUALIZAÇÃO (CANVAS) ---
        function update() {
            if (!gameActive) return;

            if (monster.active) {
                monster.x += monster.speed;

                if (monster.x >= tower.x - tower.radius) {
                    lives--;
                    livesVal.textContent = lives;
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        resetMonster();
                    }
                }
            }

            if (projectile.active) {
                const dx = projectile.targetX - projectile.x;
                const dy = projectile.targetY - projectile.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > projectile.speed) {
                    projectile.x += (dx / distance) * projectile.speed;
                    projectile.y += (dy / distance) * projectile.speed;
                } else {
                    projectile.active = false;
                    resetMonster();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Estrada
            ctx.fillStyle = '#2b2b4d';
            ctx.fillRect(0, 205, canvas.width, 40);

            // Torre Defensora
            ctx.beginPath();
            ctx.arc(tower.x, tower.y, tower.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00e676';
            ctx.fill();
            ctx.closePath();
            
            ctx.beginPath();
            ctx.arc(tower.x, tower.y, tower.radius - 10, 0, Math.PI * 2);
            ctx.fillStyle = '#162447';
            ctx.fill();
            ctx.closePath();

            // Monstro
            if (monster.active && gameActive) {
                ctx.beginPath();
                ctx.arc(monster.x, monster.y, monster.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff5252';
                ctx.fill();
                ctx.closePath();
                
                ctx.beginPath();
                ctx.arc(monster.x + 8, monster.y - 2, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.closePath();
            }

            // Projétil
            if (projectile.active) {
                ctx.beginPath();
                ctx.arc(projectile.x, projectile.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffff00';
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffff00';
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
