<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador: Bingo de Coordenadas</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --success: #2ecc71;
            --info-bg: rgba(99, 102, 241, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 30px 15px;
        }

        /* Fundo matemático sutil */
        .math-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            user-select: none;
            opacity: 0.02;
            color: var(--text-main);
            font-weight: 600;
        }
        .formula { position: absolute; white-space: nowrap; }

        /* Painel de Controle Superior */
        .setup-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
        }

        .setup-container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        /* Caixa de feedback dos limites */
        .limit-info {
            background: var(--info-bg);
            color: #a5b4fc;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-weight: 500;
        }

        .config-row { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 20px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }
        
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            padding: 10px 12px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border); 
            border-radius: 8px; 
            text-align: center; 
            font-size: 14px; 
            color: white;
            font-weight: 600;
            outline: none;
        }
        
        .highlight input { border: 1px solid var(--accent); color: #c7d2fe; width: 90px; background: rgba(99, 102, 241, 0.05); }
        .grid-select { border: 1px solid #e67e22; color: #e67e22; font-weight: bold; cursor: pointer; height: 41px; background: rgba(230, 126, 34, 0.05); }
        .layout-select { border: 1px solid var(--success); color: var(--success); font-weight: bold; cursor: pointer; height: 41px; background: rgba(46, 204, 113, 0.05); }
        .math-input { width: 75px; }

        .free-option { 
            display: flex; align-items: center; gap: 8px; padding: 10px 16px; 
            background: rgba(239, 68, 68, 0.05); border-radius: 8px; border: 1px dashed var(--danger); 
            cursor: pointer; height: 41px; box-sizing: border-box; user-select: none;
        }
        .free-option input { cursor: pointer; width: 16px; height: 16px; }
        .free-option span { font-size: 11px; font-weight: bold; color: var(--danger); letter-spacing: 0.5px; }

        .button-row { display: flex; justify-content: center; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        .btn { 
            padding: 12px 24px; color: #0f172a; border: none; border-radius: 10px; 
            font-size: 14px; cursor: pointer; font-weight: 700; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; 
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        
        .shuffle-btn { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .print-btn { background: var(--success); color: #0f172a; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
        .sorteador-btn { background: transparent; color: #a5b4fc; border: 1px solid var(--card-border); }
        .sorteador-btn:hover { background: rgba(255,255,255,0.02); border-color: var(--accent); }
        .home-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--card-border); }

        /* Estilos Globais de Renderização das Páginas (Visualização Web) */
        .page { 
            display: grid; 
            margin: 0 auto 40px auto; 
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-sizing: border-box; 
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            page-break-after: always;
            overflow: hidden;
        }

        /* Configurações Dinâmicas de Layout baseadas na escolha do usuário */
        .layout-2 { width: 297mm; height: 210mm; grid-template-columns: 1fr 1fr; padding: 12mm; gap: 12mm; }
        .layout-4 { width: 210mm; height: 297mm; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 12mm; gap: 12mm; }
        .layout-6 { width: 210mm; height: 297mm; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); padding: 10mm 12mm; gap: 8mm 10mm; }

        .card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border); 
            padding: 14px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100%; 
            box-sizing: border-box; 
            border-radius: 12px;
        }

        h4 { margin: 0 0 8px 0; color: #a5b4fc; font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 1px dashed var(--card-border); padding-bottom: 6px; letter-spacing: 0.5px; }
        
        table { width: 100%; border-collapse: collapse; flex-grow: 1; table-layout: fixed; }
        td { 
            border: 1px solid var(--card-border); 
            font-weight: 800; 
            color: white; 
            padding: 6px 2px; 
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            white-space: nowrap; /* Garante que os números fiquem sempre em linha única */
            overflow: hidden;
            text-overflow: clip;
        }
        
        /* Fontes ultra reduzidas na interface web */
        .grid-3 td { font-size: 0.95rem; }
        .grid-4 td { font-size: 0.75rem; }
        .grid-5 td { font-size: 0.65rem; }

        .free-cell { background-color: rgba(239, 68, 68, 0.15) !important; color: var(--danger) !important; font-size: 0.75em !important; font-family: system-ui, sans-serif !important; }

        .card-footer { 
            margin-top: 10px; 
            padding-top: 6px;
            border-top: 1px dashed var(--card-border);
            font-size: 10px; 
            color: var(--text-muted); 
            display: flex; 
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* AJUSTES E CALIBRAÇÃO DE IMPRESSÃO PROFISSIONAL */
        @media print {
            html, body { background: white !important; color: black !important; display: block !important; padding: 0 !important; margin: 0 !important; }
            .setup-container, .math-bg, h1 { display: none !important; }
            .page { background: white !important; color: black !important; box-shadow: none !important; border: none !important; margin: 0 !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; display: grid !important; page-break-after: always !important; break-after: page !important; }
            
            .layout-2 { width: 297mm !important; height: 210mm !important; padding: 10mm !important; gap: 10mm !important; grid-template-columns: 1fr 1fr !important; }
            .layout-4 { width: 210mm !important; height: 297mm !important; padding: 10mm !important; gap: 10mm !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: 1fr 1fr !important; }
            .layout-6 { width: 210mm !important; height: 297mm !important; padding: 10mm 12mm 8mm 12mm !important; gap: 8mm 10mm !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: repeat(3, 1fr) !important; }

            .card { background: white !important; border: 2px solid #000 !important; border-radius: 8px !important; padding: 10px !important; page-break-inside: avoid !important; break-inside: avoid !important; }
            h4 { color: black !important; border-bottom: 2px dashed #000 !important; font-size: 12px !important; margin-bottom: 6px !important; padding-bottom: 4px !important; }
            td { border: 1px solid #000 !important; color: black !important; background: white !important; white-space: nowrap !important; }
            
            /* Fontes ultra reduzidas na folha de impressão */
            .grid-3 td { font-size: 1.05rem !important; }
            .grid-4 td { font-size: 0.85rem !important; }
            .grid-5 td { font-size: 0.70rem !important; }
            
            .free-cell { background: #f5f5f5 !important; color: #000 !important; font-weight: 900 !important; font-size: 0.70em !important; }
            .card-footer { color: #333 !important; border-top: 1px dashed #000 !important; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="math-bg">
        <div class="formula" style="top: 5%; left: 5%; font-size: 2rem;">P = (x, y)</div>
        <div class="formula" style="top: 15%; right: 10%; font-size: 1.5rem;">Q1 = (+, +)</div>
        <div class="formula" style="bottom: 20%; left: 8%; font-size: 1.8rem;">f(x) ↦ (x, f(x))</div>
    </div>

    <h1 style="text-align: center; color: #a5b4fc; margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px; z-index: 10;">🎲 Bingo de Plano Cartesiano</h1>
    
    <div class="setup-container">
        <h2>✍️ Gerador de Cartelas de Bingo</h2>
        
        <div class="limit-info" id="limitFeedback">
            Carregando limites...
        </div>

        <div class="config-row">
            <div class="input-group highlight">
                <label>Qtd. Cartelas</label>
                <input type="number" id="qtdCartelas" value="30">
            </div>
            <div class="input-group">
                <label>Grade</label>
                <select id="gridSize" class="grid-select" onchange="atualizarFeedback()">
                    <option value="3">3x3</option>
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                </select>
            </div>
            <label class="free-option">
                <input type="checkbox" id="useFree" checked>
                <span>CENTRO LIVRE</span>
            </label>
        </div>

        <div class="config-row">
            <div class="input-group"><label>X Mín.</label><input type="number" id="xMin" class="math-input" value="-5" oninput="atualizarFeedback()"></div>
            <div class="input-group"><label>X Máx.</label><input type="number" id="xMax" class="math-input" value="5" oninput="atualizarFeedback()"></div>
            <div class="input-group"><label>Y Mín.</label><input type="number" id="yMin" class="math-input" value="-5" oninput="atualizarFeedback()"></div>
            <div class="input-group"><label>Y Máx.</label><input type="number" id="yMax" class="math-input" value="5" oninput="atualizarFeedback()"></div>
        </div>

        <div class="button-row">
            <a href="https://profpablosanches.github.io/portalpedagogico/" class="btn home-btn">🏠 Início</a>
            <a href="bingo-cartesiano.html" class="btn sorteador-btn">🎮 Sorteador</a>
            
            <select id="layoutSorteio" class="layout-select">
                <option value="2">2 Cartelas / Pág</option>
                <option value="4">4 Cartelas / Pág</option>
                <option value="6" selected>6 Cartelas / Pág</option>
            </select>
            
            <button class="btn shuffle-btn" onclick="gerarCartelas()">🔄 Gerar Novo Lote</button>
            <button class="btn print-btn" onclick="window.print()">🖨️ Imprimir / PDF</button>
        </div>
    </div>

    <div id="bingo-container"></div>

    <script>
        const container = document.getElementById('bingo-container');
        const feedbackEl = document.getElementById('limitFeedback');

        function atualizarFeedback() {
            const xMin = parseInt(document.getElementById('xMin').value) || 0;
            const xMax = parseInt(document.getElementById('xMax').value) || 0;
            const yMin = parseInt(document.getElementById('yMin').value) || 0;
            const yMax = parseInt(document.getElementById('yMax').value) || 0;
            const dimensao = parseInt(document.getElementById('gridSize').value);
            const useFree = document.getElementById('useFree').checked;

            const totalPares = (xMax - xMin + 1) * (yMax - yMin + 1);
            const totalCasas = dimensao * dimensao;
            const qtdNecessaria = (useFree && dimensao % 2 !== 0) ? totalCasas - 1 : totalCasas;

            if (xMax < xMin || yMax < yMin) {
                feedbackEl.style.color = "var(--danger)";
                feedbackEl.style.borderColor = "rgba(239, 64, 64, 0.3)";
                feedbackEl.innerHTML = "⚠️ <strong>Erro:</strong> Limite máximo deve ser maior que o mínimo.";
            } else if (totalPares < qtdNecessaria) {
                feedbackEl.style.color = "var(--danger)";
                feedbackEl.style.borderColor = "rgba(239, 64, 64, 0.3)";
                feedbackEl.innerHTML = `⚠️ <strong>Insuficiente:</strong> O intervalo gera ${totalPares} coordenadas, mas a grade ${dimensao}x${dimensao} precisa de ${qtdNecessaria}.`;
            } else {
                feedbackEl.style.color = "#a5b4fc";
                feedbackEl.style.borderColor = "rgba(99, 102, 241, 0.2)";
                feedbackEl.innerHTML = `✅ <strong>Disponível:</strong> ${totalPares} coordenadas únicas identificadas para este intervalo.`;
            }
        }

        async function gerarHashGrupo(semente) {
            const encoder = new TextEncoder();
            const data = encoder.encode(semente);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 10).toUpperCase();
        }

        function shuffle(array) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function gerarCartelas() {
            const xMin = parseInt(document.getElementById('xMin').value);
            const xMax = parseInt(document.getElementById('xMax').value);
            const yMin = parseInt(document.getElementById('yMin').value);
            const yMax = parseInt(document.getElementById('yMax').value);
            const totalCartelas = parseInt(document.getElementById('qtdCartelas').value);
            const dimensao = parseInt(document.getElementById('gridSize').value);
            const useFree = document.getElementById('useFree').checked;
            const perPage = parseInt(document.getElementById('layoutSorteio').value);
            
            const sementeGrupo = Date.now() + xMin + xMax + yMin + yMax + totalCartelas;
            const hashUnicoLote = await gerarHashGrupo(sementeGrupo.toString());

            let listaPares = [];
            for (let x = xMin; x <= xMax; x++) {
                for (let y = yMin; y <= yMax; y++) {
                    listaPares.push(`(${x}, ${y})`);
                }
            }

            const totalCasas = dimensao * dimensao;
            const centroIndex = Math.floor(totalCasas / 2);
            const qtdNecessaria = (useFree && dimensao % 2 !== 0) ? totalCasas - 1 : totalCasas;
            
            if (listaPares.length < qtdNecessaria) {
                alert(`Erro: O intervalo gera apenas ${listaPares.length} pares únicos, mas a cartela precisa de ${qtdNecessaria}. Aumente os limites de X ou Y.`);
                return;
            }

            container.innerHTML = '';
            let currentCard = 1;
            const totalPaginas = Math.ceil(totalCartelas / perPage);

            for (let p = 0; p < totalPaginas; p++) {
                let pageDiv = document.createElement('div');
                pageDiv.className = `page layout-${perPage}`;
                
                for (let c = 0; c < perPage; c++) {
                    if (currentCard > totalCartelas) break;

                    let sorteados = shuffle([...listaPares]).slice(0, qtdNecessaria);
                    let cardHtml = `<div class="card grid-${dimensao}">
                        <h4>PLANO CARTESIANO</h4>
                        <table>`;
                    
                    let numIndex = 0;
                    for (let l = 0; l < dimensao; l++) {
                        cardHtml += '<tr>';
                        for (let col = 0; col < dimensao; col++) {
                            let cellIndex = (l * dimensao) + col;
                            if (useFree && dimensao % 2 !== 0 && cellIndex === centroIndex) {
                                cardHtml += `<td class="free-cell">LIVRE</td>`;
                            } else {
                                cardHtml += `<td>${sorteados[numIndex]}</td>`;
                                numIndex++;
                            }
                        }
                        cardHtml += '</tr>';
                    }
                    cardHtml += `</table>
                        <div class="card-footer">
                            <span>ID LOTE: ${hashUnicoLote}</span>
                            <span>CARTELA: #${String(currentCard).padStart(3, '0')}</span>
                        </div>
                    </div>`;
                    pageDiv.innerHTML += cardHtml;
                    currentCard++;
                }
                container.appendChild(pageDiv);
            }
        }

        atualizarFeedback();
        gerarCartelas();
    </script>
</body>
</html>
