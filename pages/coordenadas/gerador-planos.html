<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador: Bingo de Coordenadas (Planos)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --success: #2ecc71;
            --info-bg: rgba(99, 102, 241, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 30px 15px;
        }

        /* Fundo matemático sutil */
        .math-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            user-select: none;
            opacity: 0.02;
            color: var(--text-main);
            font-weight: 600;
        }
        .formula { position: absolute; white-space: nowrap; }

        h1 {
            text-align: center; 
            color: #a5b4fc; 
            margin-bottom: 20px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            z-index: 10;
        }

        /* Painel de Controle Superior */
        .setup-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
        }

        /* Painel de Identificação de Limites */
        .limit-badge {
            background: var(--info-bg);
            color: #a5b4fc;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-weight: 500;
        }

        .config-row { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 20px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }
        
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            padding: 10px 12px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border); 
            border-radius: 8px; 
            text-align: center; 
            font-size: 14px; 
            color: white;
            font-weight: 600;
            outline: none;
        }
        
        select { border: 1px solid #e67e22; color: #e67e22; font-weight: bold; cursor: pointer; height: 41px; background: rgba(230, 126, 34, 0.05); }
        .limit-input { border: 1px solid var(--accent); color: #c7d2fe; width: 75px; background: rgba(99, 102, 241, 0.05); }

        .btn-row { display: flex; justify-content: center; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        .btn { 
            padding: 12px 24px; color: #0f172a; border: none; border-radius: 10px; 
            font-size: 14px; cursor: pointer; font-weight: 700; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; 
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        
        .btn-gen { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-print { background: var(--success); color: #0f172a; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
        .btn-home { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--card-border); }

        /* Layout A4 Paisagem (Visualização Web) */
        .page { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12mm; 
            width: 297mm; 
            height: 210mm; 
            margin: 0 auto 40px auto;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12mm;
            box-sizing: border-box;
            page-break-after: always;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .chart-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border); 
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            border-radius: 12px;
        }

        .chart-container {
            flex-grow: 1;
            position: relative;
            min-height: 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
        }

        .chart-title { 
            margin: 0 0 12px 0; 
            color: #a5b4fc; 
            font-size: 14px; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 1px dashed var(--card-border); 
            padding-bottom: 8px; 
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Impressão Limpa e Calibrada */
        @media print {
            html, body { background: white !important; color: black !important; display: block !important; padding: 0 !important; margin: 0 !important; }
            .setup-container, .math-bg, h1 { display: none !important; }
            .page { background: white !important; color: black !important; box-shadow: none !important; border: none !important; margin: 0 !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; display: grid !important; page-break-after: always !important; }
            .chart-box { background: white !important; border: 2px solid #000 !important; border-radius: 8px !important; padding: 12px !important; }
            .chart-title { color: black !important; border-bottom: 2px dashed #000 !important; font-size: 13px !important; }
            .chart-container { background: white !important; }
            @page { size: A4 landscape; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="math-bg">
        <div class="formula" style="top: 5%; left: 5%; font-size: 2rem;">P = (x, y)</div>
        <div class="formula" style="top: 15%; right: 10%; font-size: 1.5rem;">Q1 = (+, +)</div>
        <div class="formula" style="bottom: 20%; left: 8%; font-size: 1.8rem;">f(x) ↦ (x, f(x))</div>
    </div>

    <h1>Gerador de Planos Cartesianos</h1>

    <div class="setup-container">
        <div id="infoLimites" class="limit-badge">
            Calculando combinações possíveis...
        </div>

        <div class="config-row">
            <div class="input-group">
                <label>Qtd. de Planos</label>
                <select id="qtdPlanos">
                    <option value="2">2 Planos</option>
                    <option value="4">4 Planos</option>
                    <option value="6">6 Planos</option>
                    <option value="10">10 Planos</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pontos / Plano</label>
                <input type="number" id="pts" value="5" class="limit-input" oninput="validarLimites()">
            </div>
            <div class="input-group">
                <label>X (Mín / Máx)</label>
                <div style="display:flex; gap:6px">
                    <input type="number" id="xMin" value="-5" class="limit-input" oninput="validarLimites()">
                    <input type="number" id="xMax" value="5" class="limit-input" oninput="validarLimites()">
                </div>
            </div>
            <div class="input-group">
                <label>Y (Mín / Máx)</label>
                <div style="display:flex; gap:6px">
                    <input type="number" id="yMin" value="-5" class="limit-input" oninput="validarLimites()">
                    <input type="number" id="yMax" value="5" class="limit-input" oninput="validarLimites()">
                </div>
            </div>
        </div>

        <div class="btn-row">
            <a href="https://profpablosanches.github.io/portalpedagogico/" class="btn btn-home">🏠 Início</a>
            <button class="btn btn-gen" onclick="gerar()">🔄 Gerar Planos</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <div id="container"></div>

    <script>
        let charts = [];

        function validarLimites() {
            const xMin = parseInt(document.getElementById('xMin').value) || 0;
            const xMax = parseInt(document.getElementById('xMax').value) || 0;
            const yMin = parseInt(document.getElementById('yMin').value) || 0;
            const yMax = parseInt(document.getElementById('yMax').value) || 0;
            const pts = parseInt(document.getElementById('pts').value) || 0;
            const info = document.getElementById('infoLimites');

            const totalPossivel = (xMax - xMin + 1) * (yMax - yMin + 1);

            if (xMax <= xMin || yMax <= yMin) {
                info.style.color = "var(--danger)";
                info.style.borderColor = "rgba(239, 64, 64, 0.3)";
                info.innerHTML = "⚠️ Erro: O valor Máximo deve ser maior que o Mínimo.";
                return 0;
            }

            if (pts > totalPossivel) {
                info.style.color = "var(--danger)";
                info.style.borderColor = "rgba(239, 64, 64, 0.3)";
                info.innerHTML = `⚠️ Impossível: Você pediu ${pts} pontos, mas o intervalo só permite ${totalPossivel} coordenadas únicas.`;
            } else {
                info.style.color = "#a5b4fc";
                info.style.borderColor = "rgba(99, 102, 241, 0.2)";
                info.innerHTML = `✅ Limite Identificado: Existem ${totalPossivel} coordenadas possíveis. (Sorteando ${pts} por plano)`;
            }
            return totalPossivel;
        }

        function gerar() {
            const container = document.getElementById('container');
            const totalPlanos = parseInt(document.getElementById('qtdPlanos').value);
            const numPts = parseInt(document.getElementById('pts').value);
            const xMin = parseInt(document.getElementById('xMin').value);
            const xMax = parseInt(document.getElementById('xMax').value);
            const yMin = parseInt(document.getElementById('yMin').value);
            const yMax = parseInt(document.getElementById('yMax').value);

            const limite = validarLimites();
            if (numPts > limite) {
                alert("Reduza a quantidade de pontos ou aumente os limites dos eixos.");
                return;
            }

            container.innerHTML = '';
            charts.forEach(c => c.destroy());
            charts = [];

            let count = 0;
            while (count < totalPlanos) {
                const page = document.createElement('div');
                page.className = 'page';

                for (let i = 0; i < 2 && count < totalPlanos; i++) {
                    count++;
                    const chartId = `chart-${count}`;
                    const box = document.createElement('div');
                    box.className = 'chart-box';
                    box.innerHTML = `
                        <div class="chart-title">Plano Cartesiano #${count}</div>
                        <div class="chart-container"><canvas id="${chartId}"></canvas></div>
                    `;
                    page.appendChild(box);
                    container.appendChild(page);

                    // Gerar pontos únicos
                    let points = [];
                    const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                    while(points.length < numPts) {
                        let p = {
                            x: Math.floor(Math.random() * (xMax - xMin + 1)) + xMin,
                            y: Math.floor(Math.random() * (yMax - yMin + 1)) + yMin,
                            label: labels[points.length % labels.length]
                        };
                        if(!points.some(e => e.x === p.x && e.y === p.y)) points.push(p);
                    }

                    // Verifica se está rodando no modo escuro na tela para ajustar as cores dos eixos do ChartJS
                    const isPrint = window.matchMedia('print').matches;
                    const axisColor = '#94a3b8';
                    const gridColor = 'rgba(255,255,255,0.08)';

                    const ctx = document.getElementById(chartId).getContext('2d');
                    const newChart = new Chart(ctx, {
                        type: 'scatter',
                        data: {
                            datasets: [{
                                data: points,
                                backgroundColor: '#ef4444',
                                pointRadius: 6,
                                borderColor: '#000000',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                x: { type: 'linear', position: 'center', min: xMin - 1, max: xMax + 1, ticks: { stepSize: 1, color: axisColor }, grid: { color: gridColor } },
                                y: { type: 'linear', position: 'center', min: yMin - 1, max: yMax + 1, ticks: { stepSize: 1, color: axisColor }, grid: { color: gridColor } }
                            },
                            plugins: {
                                legend: { display: false },
                                afterDatasetsDraw: (chart) => {
                                    const {ctx} = chart;
                                    ctx.fillStyle = window.matchMedia('print').matches ? "black" : "#f8fafc";
                                    ctx.font = "bold 14px system-ui";
                                    chart.data.datasets[0].data.forEach((p) => {
                                        const xPos = chart.scales.x.getPixelForValue(p.x);
                                        const yPos = chart.scales.y.getPixelForValue(p.y);
                                        ctx.fillText(p.label, xPos + 8, yPos - 8);
                                    });
                                }
                            }
                        }
                    });
                    charts.push(newChart);
                }
            }
        }

        window.onload = validarLimites;
    </script>
</body>
</html>
